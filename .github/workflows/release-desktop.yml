name: Desktop Release Artifacts

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version, for example v0.1.0"
        required: false
        type: string
  pull_request:
    paths:
      - "apps/desktop-companion/**"
      - "packages/shared/**"
      - "tools/verification/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/workflows/release-desktop.yml"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "apps/desktop-companion/**"
      - "packages/shared/**"
      - "tools/verification/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/workflows/release-desktop.yml"

concurrency:
  group: desktop-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release Mode
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.release.outputs.should_publish }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - id: release
        shell: bash
        run: |
          set -euo pipefail

          SHOULD_PUBLISH=false
          VERSION=""

          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" == v* ]]; then
            SHOULD_PUBLISH=true
            VERSION="${{ github.ref_name }}"
          elif [[ -n "${{ github.event.inputs.release_version }}" ]]; then
            SHOULD_PUBLISH=true
            VERSION="${{ github.event.inputs.release_version }}"
          fi

          if [[ "${SHOULD_PUBLISH}" == "true" && ! "${VERSION}" =~ ^v[0-9]+(\.[0-9]+){1,2}([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "release_version must look like v0.1.0 or v0.1.0-beta.1" >&2
            exit 1
          fi

          {
            echo "should_publish=${SHOULD_PUBLISH}"
            echo "version=${VERSION}"
          } >> "${GITHUB_OUTPUT}"

  windows:
    name: Windows Artifacts
    needs: prepare
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run test

      - run: npm run package:win:bundle

      - uses: actions/upload-artifact@v7
        with:
          name: scratch-desktop-companion-windows
          path: installers/**
          if-no-files-found: error
          retention-days: 7

  macos:
    name: macOS Artifacts
    needs: prepare
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run test

      - run: npm run package:mac:zip

      - run: npm run package:mac:dmg

      - uses: actions/upload-artifact@v7
        with:
          name: scratch-desktop-companion-macos
          path: installers/**
          if-no-files-found: error
          retention-days: 7

  create-release:
    name: Publish GitHub Release
    needs: [prepare, windows, macos]
    if: ${{ needs.prepare.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: scratch-desktop-companion-*
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Scratch AI Local Client ${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, '-') }}
          generate_release_notes: true
          files: release-assets/**
