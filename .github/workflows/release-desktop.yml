name: Desktop Release Artifacts

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version, for example v0.1.0"
        required: false
        type: string
  pull_request:
    paths:
      - "apps/desktop-companion/**"
      - "packages/shared/**"
      - "tools/verification/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/workflows/release-desktop.yml"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "apps/desktop-companion/**"
      - "packages/shared/**"
      - "tools/verification/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/workflows/release-desktop.yml"

concurrency:
  group: desktop-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release Mode
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.release.outputs.should_publish }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - id: release
        shell: bash
        run: |
          set -euo pipefail

          SHOULD_PUBLISH=false
          VERSION=""

          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" == v* ]]; then
            SHOULD_PUBLISH=true
            VERSION="${{ github.ref_name }}"
          elif [[ -n "${{ github.event.inputs.release_version }}" ]]; then
            SHOULD_PUBLISH=true
            VERSION="${{ github.event.inputs.release_version }}"
          fi

          if [[ "${SHOULD_PUBLISH}" == "true" && ! "${VERSION}" =~ ^v[0-9]+(\.[0-9]+){1,2}([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "release_version must look like v0.1.0 or v0.1.0-beta.1" >&2
            exit 1
          fi

          {
            echo "should_publish=${SHOULD_PUBLISH}"
            echo "version=${VERSION}"
          } >> "${GITHUB_OUTPUT}"

  windows:
    name: Windows Artifacts
    needs: prepare
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: node scripts/run-ci-with-annotations.mjs npm run test

      - run: npm run package:win:bundle

      - uses: actions/upload-artifact@v7
        with:
          name: scratch-desktop-companion-windows
          path: installers/**
          if-no-files-found: error
          retention-days: 7

  macos:
    name: macOS Artifacts
    needs: prepare
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: node scripts/run-ci-with-annotations.mjs npm run test

      - run: npm run package:mac:zip

      - run: npm run package:mac:dmg

      - uses: actions/upload-artifact@v7
        with:
          name: scratch-desktop-companion-macos
          path: installers/**
          if-no-files-found: error
          retention-days: 7

  create-release:
    name: Publish GitHub Release
    needs: [prepare, windows, macos]
    if: ${{ needs.prepare.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: scratch-desktop-companion-*
          path: release-assets
          merge-multiple: true

      - name: Stage Release Assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-upload
          cp release-assets/ScratchDesktopCompanion-portable.exe release-upload/
          cp release-assets/ScratchDesktopCompanion-setup.exe release-upload/
          cp release-assets/ScratchDesktopCompanion-mac.zip release-upload/
          cp release-assets/ScratchDesktopCompanion-mac.dmg release-upload/
          test "$(find release-upload -type f | wc -l)" -eq 4

      - name: Clean Existing Release Assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          release_api_url="https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ needs.prepare.outputs.version }}"

          response_file="$(mktemp)"
          status_code="$(
            curl \
              --silent \
              --show-error \
              --location \
              --output "${response_file}" \
              --write-out "%{http_code}" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GITHUB_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "${release_api_url}"
          )"

          if [[ "${status_code}" == "404" ]]; then
            echo "No existing release found for ${{ needs.prepare.outputs.version }}."
            exit 0
          fi
          if [[ "${status_code}" != "200" ]]; then
            cat "${response_file}" >&2
            echo "Failed to load existing release. HTTP ${status_code}" >&2
            exit 1
          fi

          RESPONSE_FILE="${response_file}" node <<'NODE' > release-assets-to-delete.tsv
          const { readFileSync } = require("node:fs");
          const release = JSON.parse(readFileSync(process.env.RESPONSE_FILE, "utf8"));
          for (const asset of release.assets ?? []) {
            console.log(`${asset.id}\t${asset.name}`);
          }
          NODE

          while IFS=$'\t' read -r asset_id asset_name; do
            [[ -n "${asset_id}" ]] || continue
            echo "Deleting old release asset: ${asset_name}"
            delete_status="$(
              curl \
                --silent \
                --show-error \
                --location \
                --request DELETE \
                --output /tmp/delete-release-asset-response.txt \
                --write-out "%{http_code}" \
                --header "Accept: application/vnd.github+json" \
                --header "Authorization: Bearer ${GITHUB_TOKEN}" \
                --header "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${{ github.repository }}/releases/assets/${asset_id}"
            )"
            if [[ "${delete_status}" != "204" ]]; then
              cat /tmp/delete-release-asset-response.txt >&2
              echo "Failed to delete release asset ${asset_name}. HTTP ${delete_status}" >&2
              exit 1
            fi
          done < release-assets-to-delete.tsv

          verify_file="$(mktemp)"
          verify_status="$(
            curl \
              --silent \
              --show-error \
              --location \
              --output "${verify_file}" \
              --write-out "%{http_code}" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GITHUB_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "${release_api_url}"
          )"
          if [[ "${verify_status}" != "200" ]]; then
            cat "${verify_file}" >&2
            echo "Failed to verify existing release cleanup. HTTP ${verify_status}" >&2
            exit 1
          fi

          VERIFY_FILE="${verify_file}" node <<'NODE'
          const { readFileSync } = require("node:fs");
          const release = JSON.parse(readFileSync(process.env.VERIFY_FILE, "utf8"));
          const assets = release.assets ?? [];
          const withKeyAssets = assets.filter((asset) => asset.name.includes("with-key"));
          if (withKeyAssets.length > 0) {
            console.error(`with-key release assets remain: ${withKeyAssets.map((asset) => asset.name).join(", ")}`);
            process.exit(1);
          }
          if (assets.length > 0) {
            console.error(`release assets were not fully cleaned: ${assets.map((asset) => asset.name).join(", ")}`);
            process.exit(1);
          }
          NODE

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Scratch AI Local Client ${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, '-') }}
          generate_release_notes: true
          files: release-upload/*
