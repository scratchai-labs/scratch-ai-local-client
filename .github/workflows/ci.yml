name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  workspace-check:
    name: Workspace Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-2022
          - macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: node scripts/run-ci-with-annotations.mjs npm run build

      - run: node scripts/run-ci-with-annotations.mjs npm run test

      - name: Desktop companion mock UI smoke (macOS)
        if: runner.os == 'macOS'
        timeout-minutes: 5
        run: npm run desktop:test:ui:smoke


  recommendation-render-contract:
    name: Recommendation Render Contract (Ubuntu ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: node scripts/run-ci-with-annotations.mjs xvfb-run -a npm run test:recommendation-render-contract -- --shard-index=${{ matrix.shard }} --shard-count=4
